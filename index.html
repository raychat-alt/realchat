<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Global Chat</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .container { width: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; height: 100%; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; margin: 0; background: #e5ddd5; }
        .msg { padding: 10px 15px; border-radius: 20px; margin-bottom: 10px; max-width: 70%; word-wrap: break-word; }
        .msg.me { background: #dcf8c6; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 2px; }
        .msg.other { background: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        form { display: flex; padding: 10px; background: white; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { margin-left: 10px; padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🌍 Real Global Chat</div>
        <ul id="messages"></ul>
        <form id="form" action="">
            <input id="input" autocomplete="off" placeholder="Type a message..." /><button>Send</button>
        </form>
    </div>

    <!-- Load Socket.io Client -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var form = document.getElementById('form');
        var input = document.getElementById('input');
        var messages = document.getElementById('messages');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (input.value) {
                // Send to server
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });

        // Listen for messages from server
        socket.on('chat message', function(msg) {
            var item = document.createElement('li');
            item.textContent = msg;
            item.classList.add('msg');
            
            // Simple logic to style "me" vs "others" (In a real app, you'd check User ID)
            // For now, let's just append. To distinguish, we'd need to send username too.
            messages.appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
            
            // Basic visual trick: last message is always "me" visually for demo
            const allMsgs = document.querySelectorAll('.msg');
            allMsgs[allMsgs.length-1].classList.add('me');
            if(allMsgs.length > 1) allMsgs[allMsgs.length-2].classList.add('other');
        });
    </script>
</body>
</html>
